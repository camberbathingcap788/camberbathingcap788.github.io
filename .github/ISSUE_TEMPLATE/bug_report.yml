name: "Bug Report"
description: "Report a technical issue or unexpected behavior"
title: "[BUG] - "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide all required details below.

  - type: input
    id: summary
    attributes:
      label: "Bug Summary"
      description: "A short description of the issue"
      placeholder: "Example: Page crashes when loading impact charts"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "List the exact steps to reproduce the issue"
      placeholder: |
        1. Go to /impact
        2. Click on 'Load Metrics'
        3. Observe crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "Describe what should have happened"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      placeholder: "Describe what actually happened"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "Environment"
      options:
        - "Production"
        - "Staging"
        - "Development"
        - "Local"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Screenshots"
      description: "Paste logs or attach screenshots if available"
      placeholder: "Error: Unexpected token < in JSON..."
