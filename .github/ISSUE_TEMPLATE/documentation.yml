name: "Documentation Update"
description: "Request changes or improvements to documentation"
title: "[DOCS] - "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request updates or improvements to documentation.

  - type: input
    id: doc_section
    attributes:
      label: "Documentation Section"
      placeholder: "Example: docs/architecture.md"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: "Issue Description"
      placeholder: "Explain what is missing, incorrect, or unclear"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: "Suggested Improvement"
      placeholder: "Describe how the documentation should be updated"
