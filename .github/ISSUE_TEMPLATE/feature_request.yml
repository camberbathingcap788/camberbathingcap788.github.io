name: "Feature Request"
description: "Propose a new feature or improvement"
title: "[FEATURE] - "
labels: ["enhancement", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature. Please fill out the details below.

  - type: input
    id: summary
    attributes:
      label: "Feature Summary"
      placeholder: "Example: Add dark mode support"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "Why is this feature important?"
      placeholder: "Explain the problem this feature solves"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed Solution"
      placeholder: "Describe how the feature should work"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      placeholder: "List any alternative solutions"
